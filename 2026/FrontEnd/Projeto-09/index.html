<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Eletrônico - Estrutura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Prontuário Eletrônico</span>
        </div>
    </nav>

    <div class="container mt-4">
        <form>
            
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-info text-white text-center">
                    <h5 class="mb-0">Dados do Paciente</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" placeholder="Digite o nome">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control" placeholder="000.000.000-00">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-info text-white text-center">
                    <h5 class="mb-0">Sinais Vitais</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Pressão Arterial</label>
                            <input type="text" class="form-control" placeholder="120/80 mmHg">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Frequência Cardíaca</label>
                            <input type="text" class="form-control" placeholder="bpm">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Temperatura</label>
                            <input type="text" class="form-control" placeholder="°C">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Saturação O2</label>
                            <input type="text" class="form-control" placeholder="%">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-info text-white text-center">
                    <h5 class="mb-0">Evolução do Paciente</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Relatório de Evolução</label>
                        <textarea class="form-control" rows="4" placeholder="Descreva a evolução clínica..."></textarea>
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-info text-white text-center">
                    <h5 class="mb-0">Medicação</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Medicamento</label>
                            <input type="text" class="form-control" placeholder="Nome do remédio">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Dosagem</label>
                            <input type="text" class="form-control" placeholder="Ex: 500mg">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Horario</label>
                            <input type="time" class="form-control">
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-end mb-5">
                <button class="btn btn-primary btn-lg" type="submit">Salvar Prontuário</button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
